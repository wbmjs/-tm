name: 火种 VPN 链接提取器

# 触发条件
on:
  schedule:
    - cron: '0 */6 * * *'          # 每 6 小时执行一次（UTC 时间，香港 +8 小时）
  workflow_dispatch:               # 允许手动在 GitHub 界面点击执行

# 必要权限：允许写入仓库内容（commit / push）
permissions:
  contents: write

# 提前启用 Node.js 24 环境（可选，建议用于测试）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  extract-links:
    runs-on: ubuntu-latest
    steps:
      # 步骤 1：拉取仓库代码（更新为 @v6，支持 Node.js 24）
      - name: 拉取代码
        uses: actions/checkout@v6
        # 注意：这里不要加 persist-credentials: false，否则 push 会失败

      # 步骤 2：设置 Python 环境（更新为 @v6，支持 Node.js 24）
      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # 步骤 3：安装依赖套件
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # 步骤 4：执行你的 Python 脚本
      - name: 执行链接提取脚本
        env:
          HUOZHONG_USERNAME:     ${{ secrets.HUOZHONG_USERNAME }}
          HUOZHONG_PASSWORD:     ${{ secrets.HUOZHONG_PASSWORD }}
          HUOZHONG_CLIENT_ID:    ${{ secrets.HUOZHONG_CLIENT_ID }}
          HUOZHONG_CLIENT_SECRET: ${{ secrets.HUOZHONG_CLIENT_SECRET }}
        run: python 火种.py

      # 步骤 5：自动 commit & push 生成的 txt 文件（更新为 @v7，支持 Node.js 24）
      - name: 自动 commit & push 链接文件
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "自动更新：火种 VPN vless/vmess 链接 (Run #${{ github.run_number }})"
          file_pattern: huozhong_vless_vmess_links.txt
          branch: main
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          skip_dirty_check: false          # 只在有变更时才 commit
          skip_fetch: true                 # 加速执行
          # 如果你真的需要 force push，可以加上下面这行（通常不需要）
          # push_options: '--force-with-lease'

      # 步骤 6：显示完成消息（无论成功失败都执行）
      - name: 显示执行结果
        if: always()
        run: |
          echo "======================================"
          echo "执行完成 (Run #${{ github.run_number }})"
          echo "请检查仓库的 commit 历史，确认 huozhong_vless_vmess_links.txt 是否更新"
          echo "如果 push 失败，请查看上面的 log"
          echo "======================================"
